name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Build before test: the suite exercises the built CLI (e.g. inbox-popup boots
      # dist/cli.js), so an unbuilt tree fails the test step, not just the publish.
      - run: npm run build

      - run: npm test

      - name: Bump version
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bump=patch
          if [[ "$COMMIT_MESSAGE" == feat\!:* ]] || grep -q '^BREAKING CHANGE' <<< "$COMMIT_MESSAGE"; then
            bump=minor
          fi
          npm version "$bump" -m "chore: release v%s"
          git push --follow-tags

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
